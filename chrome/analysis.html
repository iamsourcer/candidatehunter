<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Candidate Analysis</title>
  <style>
    * { box-sizing: border-box; }
    body {
      max-width: 860px;
      margin: 0 auto;
      padding: 36px 28px 60px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      color: #1a1a1a;
      background: #fff;
      line-height: 1.65;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 32px;
      padding-bottom: 18px;
      border-bottom: 2px solid #e8e8e8;
    }
    .candidate-name {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a1a;
      flex: 1;
      min-width: 200px;
    }
    .match-pct {
      font-size: 15px;
      font-weight: 600;
      color: #555;
      white-space: nowrap;
    }
    .verdict-badge {
      padding: 5px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .verdict-badge.advance    { background: #e6f4ea; color: #057642; }
    .verdict-badge.hold       { background: #fff8e1; color: #c07800; }
    .verdict-badge.long-shot  { background: #fff3e0; color: #d4500a; }
    .verdict-badge.archive    { background: #fde8e8; color: #c0392b; }
    #copy-btn {
      background: #f5f5f5;
      border: 1px solid #ddd;
      padding: 8px 18px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      color: #333;
      transition: background 0.15s;
      white-space: nowrap;
    }
    #copy-btn:hover { background: #e8e8e8; }

    /* ── Content ── */
    #analysis-content h2 {
      font-size: 19px;
      font-weight: 700;
      margin: 32px 0 10px;
      color: #111;
    }
    #analysis-content h3 {
      font-size: 16px;
      font-weight: 600;
      margin: 22px 0 8px;
      color: #222;
    }
    #analysis-content hr {
      border: none;
      border-top: 1px solid #e0e0e0;
      margin: 28px 0;
    }
    #analysis-content ul {
      margin: 8px 0 8px 0;
      padding-left: 22px;
    }
    #analysis-content li { margin: 5px 0; }
    #analysis-content p { margin: 10px 0; }
    #analysis-content strong { font-weight: 600; }
    #analysis-content em { font-style: italic; }
    #analysis-content code {
      background: #f4f4f4;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 13px;
    }
    .empty-state {
      color: #888;
      font-size: 15px;
      padding: 60px 20px;
      text-align: center;
    }

    /* ── Profile section ── */
    .profile-section {
      background: #fafafa;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      margin-bottom: 28px;
      overflow: hidden;
    }
    .profile-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 20px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #777;
      user-select: none;
    }
    .profile-toggle:hover { background: #f0f0f0; }
    .profile-toggle-arrow { transition: transform 0.2s; font-size: 10px; color: #aaa; }
    .profile-section.collapsed .profile-toggle-arrow { transform: rotate(-90deg); }
    .profile-section.collapsed .profile-body { display: none; }
    .profile-body { padding: 2px 20px 18px; }

    /* Highlight pills (profile section) */
    .hl-pills-block { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0 14px; }
    .hl-pill-pos, .hl-pill-neg, .hl-pill-miss {
      display: inline-block;
      padding: 3px 11px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }
    .hl-pill-pos  { background: rgba(5,118,66,0.10);   color: #057642; border: 1px solid rgba(5,118,66,0.22); }
    .hl-pill-neg  { background: rgba(192,57,43,0.08);  color: #c0392b; border: 1px solid rgba(192,57,43,0.20); }
    .hl-pill-miss { background: #f3f3f3; color: #666; border: 1px solid #ddd; }

    /* Resume header inside profile section */
    .prof-resume-header {
      padding-bottom: 12px;
      margin-bottom: 12px;
      border-bottom: 1px solid #eee;
    }
    .prof-res-name     { font-size: 17px; font-weight: 700; color: #1a1a1a; }
    .prof-res-subtitle { font-size: 13px; color: #666; margin-top: 2px; }

    /* Download button */
    #download-profile-btn {
      background: none;
      border: 1px solid #ddd;
      padding: 3px 11px;
      border-radius: 4px;
      font-size: 11px;
      color: #666;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    #download-profile-btn:hover { border-color: #0073b1; color: #0073b1; }

    /* Inline text marks */
    mark.hl-pos { background: rgba(5,118,66,0.16); border-radius: 2px; padding: 0 2px; color: inherit; font-weight: 600; }
    mark.hl-neg { background: rgba(192,57,43,0.13); border-radius: 2px; padding: 0 2px; color: inherit; font-weight: 600; }

    /* Profile content typography */
    .prof-section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #aaa;
      margin: 12px 0 5px;
    }
    .prof-exp-item { margin-bottom: 10px; }
    .prof-exp-header { font-size: 13px; font-weight: 600; color: #1a1a1a; }
    .prof-period { font-weight: 400; color: #999; font-size: 12px; }
    .prof-exp-desc {
      font-size: 13px;
      color: #555;
      margin-top: 3px;
      white-space: pre-wrap;
      word-wrap: break-word;
      line-height: 1.55;
    }
    .prof-about {
      font-size: 13px;
      color: #555;
      white-space: pre-wrap;
      word-wrap: break-word;
      line-height: 1.55;
    }
    .prof-skills { font-size: 13px; color: #555; line-height: 1.7; }

    /* ── Suggested search terms ── */
    .suggest-section {
      margin-top: 32px;
      padding: 18px 20px;
      background: #f7f8ff;
      border: 1px solid #d0d8f8;
      border-radius: 8px;
    }
    .suggest-section h3 {
      font-size: 16px;
      font-weight: 600;
      margin: 0 0 6px;
      color: #2c3a9e;
    }
    .suggest-desc {
      font-size: 13px;
      color: #666;
      margin: 0 0 12px;
    }
    .suggest-pills { display: flex; flex-wrap: wrap; gap: 6px; }
    .suggest-pill {
      display: inline-block;
      background: #eef1fd;
      border: 1px solid #c5cff7;
      color: #3949ab;
      border-radius: 12px;
      padding: 4px 14px;
      font-size: 13px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="candidate-name" id="candidate-name">Loading...</div>
    <div class="match-pct" id="match-pct"></div>
    <span class="verdict-badge" id="verdict-badge"></span>
    <button id="copy-btn">Copy Analysis</button>
  </div>

  <div id="analysis-content"></div>

  <script src="analysis.js"></script>
</body>
</html>
