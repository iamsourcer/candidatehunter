<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Candidate Analysis</title>
  <style>
    * { box-sizing: border-box; }
    body {
      max-width: 860px;
      margin: 0 auto;
      padding: 36px 28px 60px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      color: #1a1a1a;
      background: #fff;
      line-height: 1.65;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 32px;
      padding-bottom: 18px;
      border-bottom: 2px solid #e8e8e8;
    }
    .candidate-name {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a1a;
      flex: 1;
      min-width: 200px;
    }
    .match-pct {
      font-size: 15px;
      font-weight: 600;
      color: #555;
      white-space: nowrap;
    }
    .verdict-badge {
      padding: 5px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .verdict-badge.advance    { background: #e6f4ea; color: #057642; }
    .verdict-badge.hold       { background: #fff8e1; color: #c07800; }
    .verdict-badge.long-shot  { background: #fff3e0; color: #d4500a; }
    .verdict-badge.archive    { background: #fde8e8; color: #c0392b; }
    #copy-btn {
      background: #f5f5f5;
      border: 1px solid #ddd;
      padding: 8px 18px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      color: #333;
      transition: background 0.15s;
      white-space: nowrap;
    }
    #copy-btn:hover { background: #e8e8e8; }

    /* ── Content ── */
    #analysis-content h2 {
      font-size: 19px;
      font-weight: 700;
      margin: 32px 0 10px;
      color: #111;
    }
    #analysis-content h3 {
      font-size: 16px;
      font-weight: 600;
      margin: 22px 0 8px;
      color: #222;
    }
    #analysis-content hr {
      border: none;
      border-top: 1px solid #e0e0e0;
      margin: 28px 0;
    }
    #analysis-content ul {
      margin: 8px 0 8px 0;
      padding-left: 22px;
    }
    #analysis-content li { margin: 5px 0; }
    #analysis-content p { margin: 10px 0; }
    #analysis-content strong { font-weight: 600; }
    #analysis-content em { font-style: italic; }
    #analysis-content code {
      background: #f4f4f4;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 13px;
    }
    .empty-state {
      color: #888;
      font-size: 15px;
      padding: 60px 20px;
      text-align: center;
    }

    /* ── Suggested search terms ── */
    .suggest-section {
      margin-top: 32px;
      padding: 18px 20px;
      background: #f7f8ff;
      border: 1px solid #d0d8f8;
      border-radius: 8px;
    }
    .suggest-section h3 {
      font-size: 16px;
      font-weight: 600;
      margin: 0 0 6px;
      color: #2c3a9e;
    }
    .suggest-desc {
      font-size: 13px;
      color: #666;
      margin: 0 0 12px;
    }
    .suggest-pills { display: flex; flex-wrap: wrap; gap: 6px; }
    .suggest-pill {
      display: inline-block;
      background: #eef1fd;
      border: 1px solid #c5cff7;
      color: #3949ab;
      border-radius: 12px;
      padding: 4px 14px;
      font-size: 13px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="candidate-name" id="candidate-name">Loading...</div>
    <div class="match-pct" id="match-pct"></div>
    <span class="verdict-badge" id="verdict-badge"></span>
    <button id="copy-btn">Copy Analysis</button>
  </div>

  <div id="analysis-content"></div>

  <script src="analysis.js"></script>
</body>
</html>
